name: Daily Stock Data Collector

on:
  schedule:
    # UTC 기준 월~금 06:35 실행 (한국 시간 PM 15:35)
    - cron: '35 6 * * 1-5'
  workflow_dispatch: # 버튼을 눌러 수동 실행도 가능하게 설정

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests lxml html5lib

    - name: Run Collector Script
      run: python collector.py

    - name: Commit & Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stock_rotation_20days.csv
        git commit -m "Auto update stock data [$(date +'%Y-%m-%d')]" || exit 0
        git push
